# Autostart apps
# Not sure if this does anything
exec-once = hyprctl setcursor Adwaita 10

# Audio
exec-once = pipewire

# Desktop
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = waybar

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

